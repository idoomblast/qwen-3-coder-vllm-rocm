services:
  # ─── llama.cpp Server (GGUF on MI300X) ────────────────────────
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: llama-cpp-rocm-mi300x:latest
    container_name: llama-mi300x
    privileged: true
    devices:
      - /dev/kfd
      - /dev/dri
    volumes:
      - ./models:/models:ro
    environment:
      - HIP_VISIBLE_DEVICES=0
      - HSA_OVERRIDE_GFX_VERSION=9.4.2   # MI300X GFX target
    ports:
      - "8000:8080"
    ipc: host
    command:
      - --model
      - /models/Qwen3-Coder-Next-UD-Q4_K_XL/Qwen3-Coder-Next-UD-Q4_K_XL.gguf
      - --ctx-size
      - "1048576"                         # 1M total = 256K per slot × 4
      - --n-gpu-layers
      - "99"                              # Offload semua layer ke GPU
      - --flash-attn
      - "on"                              # Flash Attention buat long context
      - --threads
      - "16"
      - --parallel
      - "4"                               # 4 concurrent slots × 256K each
      - --batch-size
      - "4096"                              # Prefill batch size (default 2048)
      - --ubatch-size
      - "1024"                              # Micro batch size (default 512)
      - --cache-type-k
      - q8_0                                # KV cache key quantized → hemat VRAM
      - --cache-type-v
      - q8_0                                # KV cache value quantized → hemat VRAM
      - --cache-reuse
      - "256"                               # Reuse prompt prefix cache (multi-turn speedup)
      - --mlock                             # Lock model in memory, prevent swap
      - --metrics                           # Enable Prometheus metrics at /metrics
      - --cont-batching                   # Continuous batching
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --api-key
      - "${VLLM_API_KEY}"
      - --temp
      - "1.0"                             # Qwen recommended
      - --top-p
      - "0.95"                            # Qwen recommended
      - --top-k
      - "40"                              # Qwen recommended
      - --min-p
      - "0.01"                            # Qwen recommended (llama.cpp default 0.05)
      - --repeat-penalty
      - "1.0"                             # Qwen recommended: disabled
      - --alias
      - "qwen3-coder-next"                # Model name untuk API
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s                  # GGUF loads faster than FP8
    restart: unless-stopped

  # ─── Cloudflare Tunnel (Ingress) ──────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      llama-server:
        condition: service_started
    restart: unless-stopped